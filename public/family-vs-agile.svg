<rect x="163" y="255" width="110" height="38" fill="#0f1e38" stroke="#2563eb" stroke-width="1.5" rx="3"/>
<text x="218" y="279" text-anchor="middle" font-size="12" fill="#93c5fd" font-weight="600">Dev</text>
